<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>TQQQ Signal</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060a12;color:#cbd5e1;font-family:'Inter',-apple-system,sans-serif;font-size:14px}
.w{max-width:640px;margin:0 auto;padding:16px}
.c{background:#0d1520;border:1px solid #1a2640;border-radius:12px;padding:14px;margin-bottom:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.m{font-family:'JetBrains Mono',monospace;font-size:12px}
.b{font-weight:700}
.d{color:#4a5f7a;font-size:11px}
.wh{color:#f1f5f9}
.gr{color:#10b981}.rd{color:#ef4444}.yl{color:#eab308}.or{color:#f97316}.cy{color:#22d3ee}.sk{color:#38bdf8}
button{cursor:pointer;font-size:13px;border:none;border-radius:8px;padding:10px 16px;font-weight:600}
input{width:100%;padding:10px;border-radius:8px;border:1px solid #1a2640;background:#131d2e;color:#f1f5f9;font-size:16px;font-family:'JetBrains Mono',monospace}
.tabs{display:flex;gap:4px;margin:12px 0;flex-wrap:wrap}
.tab{padding:6px 12px;border-radius:6px;border:1px solid #1a2640;background:transparent;color:#4a5f7a;font-size:12px}
.tab.on{color:#060a12}
h1{font-size:20px;color:#f1f5f9;margin:4px 0}
h2{font-size:14px;color:#f1f5f9;margin-bottom:10px}
.big{font-size:22px;font-weight:700;font-family:'Space Grotesk',sans-serif;margin:2px 0;color:#f1f5f9}
.row{display:flex;gap:10px;align-items:flex-start;padding:8px 10px;background:#131d2e;border:1px solid #1a2640;border-radius:8px;margin-bottom:4px}
.dot{width:6px;height:6px;border-radius:50%;margin-top:5px;flex-shrink:0}
canvas{width:100%;height:240px;display:block;margin-top:8px}
.sig{border-radius:16px;padding:20px;margin-bottom:12px}
.spin{display:inline-block;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
.alert-pulse{animation:pulse 1.5s ease-in-out infinite}
</style>
</head>
<body>
<div class="w" id="app">
<div style="text-align:center;padding:40px;color:#4a5f7a"><span class="spin">⏳</span> 구글시트에서 데이터 로딩중...</div>
</div>

<script>
var CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRa2K1WPxeb6O6H5Pmy5NL-v5IMK6Wf_tsvVi69ndpuQAr9m-DXnBtSLJiHtrjjXpOU6KvqNirbzMLH/pub?gid=1409073712&single=true&output=csv";

var rows = [];
var currentTab = "signal";
var portVal = "";

function parseCSV(text) {
  var lines = text.split("\n");
  var result = [];
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) continue;
    var cells = [];
    var inQuote = false;
    var cell = "";
    for (var j = 0; j < line.length; j++) {
      var ch = line[j];
      if (ch === '"') { inQuote = !inQuote; }
      else if (ch === ',' && !inQuote) { cells.push(cell.trim()); cell = ""; }
      else { cell += ch; }
    }
    cells.push(cell.trim());
    result.push(cells);
  }
  return result;
}

function loadData() {
  var direct = CSV_URL + "&_t=" + Date.now();
  var proxy = "https://api.allorigins.win/raw?url=" + encodeURIComponent(CSV_URL);

  var xhr = new XMLHttpRequest();
  xhr.timeout = 10000;
  xhr.onload = function() {
    try {
      var parsed = parseCSV(xhr.responseText);
      if (parsed.length < 3) { tryProxy(); return; }
      rows = parsed;
      render();
    } catch(e) { tryProxy(); }
  };
  xhr.onerror = function() { tryProxy(); };
  xhr.ontimeout = function() { tryProxy(); };
  xhr.open("GET", direct);
  xhr.send();

  function tryProxy() {
    var xhr2 = new XMLHttpRequest();
    xhr2.timeout = 10000;
    xhr2.onload = function() {
      try {
        var parsed = parseCSV(xhr2.responseText);
        if (parsed.length < 3) { showError("데이터 부족"); return; }
        rows = parsed;
        render();
      } catch(e) { showError("파싱 오류: " + e.message); }
    };
    xhr2.onerror = function() { showError("네트워크 오류 — GitHub Pages에서 열어주세요"); };
    xhr2.ontimeout = function() { showError("타임아웃 — 새로고침 해주세요"); };
    xhr2.open("GET", proxy);
    xhr2.send();
  }
}

function showError(msg) {
  document.getElementById("app").innerHTML = '<div style="padding:30px;text-align:center"><div style="color:#ef4444;font-size:14px;margin-bottom:12px">✗ ' + msg + '</div><button onclick="location.reload()" style="background:#1a2640;color:#cbd5e1;padding:10px 20px">새로고침</button></div>';
}

function getRow(i) {
  if (i >= rows.length) return null;
  var r = rows[i];
  return {
    date: r[0] || "",
    tqqq: parseFloat(r[1]) || 0,
    qqq: parseFloat(r[2]) || 0,
    ma: parseFloat(r[3]) || 0,
    dev: parseFloat(r[4]) || 0,
    regime: r[5] || "",
    cooldown: parseFloat(r[6]) || 0,
    ath: parseFloat(r[7]) || 0,
    dd: parseFloat(r[8]) || 0,
    alloc: parseFloat(r[9]) || 0,
    action: r[10] || ""
  };
}

function drawChart() {
  var cv = document.getElementById("cv");
  if (!cv || rows.length < 130) return;
  var ctx = cv.getContext("2d");
  var dpr = window.devicePixelRatio || 1;
  var w = cv.parentElement.clientWidth - 16, h = 240;
  cv.width = w * dpr; cv.height = h * dpr;
  cv.style.width = w + "px"; cv.style.height = h + "px";
  ctx.scale(dpr, dpr);

  var count = Math.min(120, rows.length - 1);
  var data = [];
  for (var i = 1; i <= count; i++) {
    var r = getRow(i);
    if (r) data.push(r);
  }
  data.reverse();

  var vals = [];
  for (var i = 0; i < data.length; i++) {
    vals.push(data[i].qqq);
    if (data[i].ma > 0) { vals.push(data[i].ma); vals.push(data[i].ma * 1.015); vals.push(data[i].ma * 0.985); }
  }
  var mn = Math.min.apply(null, vals) * 0.995, mx = Math.max.apply(null, vals) * 1.005;
  var pad = {t:15, r:10, b:28, l:48};
  var cw = w - pad.l - pad.r, ch = h - pad.t - pad.b;
  function xp(i) { return pad.l + (i / (data.length - 1)) * cw; }
  function yp(v) { return pad.t + (1 - (v - mn) / (mx - mn)) * ch; }

  ctx.strokeStyle = "rgba(42,48,68,0.4)"; ctx.lineWidth = 0.5;
  for (var i = 0; i < 5; i++) {
    var yy = pad.t + i * ch / 4;
    ctx.beginPath(); ctx.moveTo(pad.l, yy); ctx.lineTo(w - pad.r, yy); ctx.stroke();
    ctx.fillStyle = "#4a5f7a"; ctx.font = "9px JetBrains Mono"; ctx.textAlign = "right";
    ctx.fillText("$" + Math.round(mn + (mx - mn) * (1 - i / 4)), pad.l - 4, yy + 3);
  }
  ctx.fillStyle = "#4a5f7a"; ctx.font = "8px JetBrains Mono"; ctx.textAlign = "center";
  var step = Math.floor(data.length / 5);
  for (var i = 0; i < data.length; i += step) { ctx.fillText(data[i].date, xp(i), h - 6); }

  ctx.fillStyle = "rgba(234,179,8,0.05)"; ctx.beginPath();
  var started = false;
  for (var i = 0; i < data.length; i++) { if (data[i].ma > 0) { var u = data[i].ma * 1.015; if (!started) { ctx.moveTo(xp(i), yp(u)); started = true; } else ctx.lineTo(xp(i), yp(u)); } }
  for (var i = data.length - 1; i >= 0; i--) { if (data[i].ma > 0) ctx.lineTo(xp(i), yp(data[i].ma * 0.985)); }
  ctx.fill();

  ctx.setLineDash([3, 3]); ctx.strokeStyle = "rgba(234,179,8,0.35)"; ctx.lineWidth = 1;
  ctx.beginPath(); started = false;
  for (var i = 0; i < data.length; i++) { if (data[i].ma > 0) { var u = data[i].ma * 1.015; if (!started) { ctx.moveTo(xp(i), yp(u)); started = true; } else ctx.lineTo(xp(i), yp(u)); } } ctx.stroke();
  ctx.beginPath(); started = false;
  for (var i = 0; i < data.length; i++) { if (data[i].ma > 0) { var l = data[i].ma * 0.985; if (!started) { ctx.moveTo(xp(i), yp(l)); started = true; } else ctx.lineTo(xp(i), yp(l)); } } ctx.stroke();
  ctx.setLineDash([]);

  ctx.strokeStyle = "#f97316"; ctx.lineWidth = 2; ctx.beginPath(); started = false;
  for (var i = 0; i < data.length; i++) { if (data[i].ma > 0) { if (!started) { ctx.moveTo(xp(i), yp(data[i].ma)); started = true; } else ctx.lineTo(xp(i), yp(data[i].ma)); } } ctx.stroke();

  ctx.strokeStyle = "#22d3ee"; ctx.lineWidth = 2.5; ctx.beginPath();
  ctx.moveTo(xp(0), yp(data[0].qqq));
  for (var i = 1; i < data.length; i++) ctx.lineTo(xp(i), yp(data[i].qqq));
  ctx.stroke();

  ctx.font = "10px JetBrains Mono";
  ctx.fillStyle = "#22d3ee"; ctx.fillText("━ QQQ", pad.l + 10, pad.t + 4);
  ctx.fillStyle = "#f97316"; ctx.fillText("━ 175MA", pad.l + 75, pad.t + 4);
  ctx.fillStyle = "#4a5f7a"; ctx.fillText("┈ ±1.5%", pad.l + 148, pad.t + 4);
}

function render() {
  var s = getRow(1);
  var s2 = getRow(2);
  var s3 = getRow(3);
  if (!s || !s2) { showError("데이터 부족"); return; }

  var regime = s.regime;
  var dd = s.dd;
  var alloc = s.alloc;
  var mode = regime === "BULL" ? "bull" : (dd > 50 ? "dip" : "bear");

  var modeColor = mode === "bear" ? "#ef4444" : mode === "dip" ? "#38bdf8" : "#10b981";
  var modeBg = mode === "bear" ? "rgba(239,68,68,0.07)" : mode === "dip" ? "rgba(56,189,248,0.07)" : "rgba(16,185,129,0.07)";
  var modeBd = mode === "bear" ? "rgba(239,68,68,0.2)" : mode === "dip" ? "rgba(56,189,248,0.2)" : "rgba(16,185,129,0.2)";
  var modeIcon = mode === "dip" ? "💎" : mode === "bear" ? "🛡️" : "⚡";
  var modeLbl = mode === "dip" ? "저점 매수 모드" : mode === "bear" ? "방어 모드" : "공격 모드";
  var devColor = s.dev > 1.5 ? "#10b981" : s.dev < -1.5 ? "#ef4444" : "#eab308";
  var ddColor = dd > 50 ? "#38bdf8" : dd > 30 ? "#eab308" : "#10b981";

  var ma = s.ma;
  var upper = ma * 1.015, lower = ma * 0.985;
  var daysToQ = "?";
  try {
    var parts = s.date.replace(/\s/g, "").split(".");
    var yr = parseInt(parts[0]), mo = parseInt(parts[1]), dy = parseInt(parts[2]);
    var now = new Date(yr, mo - 1, dy);
    var qEnds = [[3,31],[6,30],[9,30],[12,31]];
    for (var i = 0; i < qEnds.length; i++) {
      var qe = new Date(yr, qEnds[i][0] - 1, qEnds[i][1]);
      if (qe >= now) { daysToQ = Math.max(0, Math.round((qe - now) / 86400000)); break; }
    }
  } catch(e) {}

  var h = "";

  // Header
  h += '<div style="display:flex;justify-content:space-between;margin-bottom:14px">';
  h += '<div><div class="m d" style="letter-spacing:1px;color:#10b981">TQQQ DEFENSE+ · 175MA ±1.5%</div>';
  h += '<h1>매매 시그널</h1>';
  h += '<div class="m d">CAGR 33.2% · MDD -44.7% · Calmar 0.74</div></div>';
  h += '<div style="text-align:right"><div class="m d">기준일</div>';
  h += '<div class="m b wh">' + s.date + '</div>';
  h += '<div class="m d">구글시트 실시간</div></div></div>';

  // ACTION 경고 배너
  if (s.action && s.action.length > 0) {
    var isAttack = s.action.indexOf("공격") >= 0;
    var isDip = s.action.indexOf("저점") >= 0;
    var bannerBg = isAttack ? "rgba(16,185,129,0.15)" : isDip ? "rgba(56,189,248,0.15)" : "rgba(239,68,68,0.15)";
    var bannerBd = isAttack ? "rgba(16,185,129,0.5)" : isDip ? "rgba(56,189,248,0.5)" : "rgba(239,68,68,0.5)";
    var bannerColor = isAttack ? "#10b981" : isDip ? "#38bdf8" : "#ef4444";
    h += '<div class="alert-pulse" style="background:' + bannerBg + ';border:2px solid ' + bannerBd + ';border-radius:12px;padding:16px;margin-bottom:12px;text-align:center">';
    h += '<div style="font-size:24px;margin-bottom:6px">🚨</div>';
    h += '<div style="font-size:18px;font-weight:700;color:' + bannerColor + '">' + s.action + '</div>';
    h += '<div style="font-size:11px;color:#8896ab;margin-top:6px">종가 확인 후 익일 시가에 매매</div>';
    h += '</div>';
  }

  // 전일 대비 변동 감지
  if (s2 && s.regime !== s2.regime) {
    h += '<div style="background:rgba(245,158,11,0.15);border:2px solid rgba(245,158,11,0.5);border-radius:12px;padding:12px;margin-bottom:12px;text-align:center">';
    h += '<div style="font-size:15px;font-weight:700;color:#eab308">⚠️ 레짐 전환: ' + s2.regime + ' → ' + s.regime + '</div></div>';
  }
  if (s2 && s.alloc !== s2.alloc) {
    h += '<div style="background:rgba(245,158,11,0.15);border:2px solid rgba(245,158,11,0.5);border-radius:12px;padding:12px;margin-bottom:12px;text-align:center">';
    h += '<div style="font-size:15px;font-weight:700;color:#eab308">⚠️ 배분 변경: ' + s2.alloc + '% → ' + s.alloc + '%</div></div>';
  }

  // Signal Card
  h += '<div class="sig" style="background:' + modeBg + ';border:2px solid ' + modeBd + '">';
  h += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">';
  h += '<div style="width:48px;height:48px;border-radius:14px;background:' + modeColor + '15;border:2px solid ' + modeColor + '40;display:flex;align-items:center;justify-content:center;font-size:24px">' + modeIcon + '</div>';
  h += '<div><div class="b" style="color:' + modeColor + ';font-size:13px">' + modeLbl + '</div>';
  h += '<div class="b wh" style="font-size:26px;line-height:1.1">TQQQ ' + alloc + '% · 현금 ' + (100 - alloc) + '%</div></div></div>';
  h += '<div class="g3" style="padding-top:12px;border-top:1px solid ' + modeColor + '22">';
  h += '<div><div class="d">TQQQ</div><div class="m b wh">$' + s.tqqq + '</div></div>';
  h += '<div><div class="d">QQQ vs MA</div><div class="m b" style="color:' + devColor + '">' + (s.dev > 0 ? "+" : "") + s.dev.toFixed(1) + '%</div></div>';
  h += '<div><div class="d">TQQQ DD</div><div class="m b" style="color:' + ddColor + '">-' + dd.toFixed(0) + '%</div></div></div>';
  h += '<div class="g3" style="margin-top:6px">';
  h += '<div><div class="d">175MA</div><div class="m b or">$' + ma.toFixed(0) + '</div></div>';
  h += '<div><div class="d">ATH</div><div class="m" style="color:#4a5f7a">$' + s.ath.toFixed(2) + '</div></div>';
  h += '<div><div class="d">리밸런싱</div><div class="m b yl">D-' + daysToQ + '</div></div></div></div>';

  // Tabs
  h += '<div class="tabs">';
  var tabList = [["signal","시그널"],["calc","배분계산"],["chart","차트"],["history","히스토리"]];
  for (var i = 0; i < tabList.length; i++) {
    var isOn = currentTab === tabList[i][0];
    h += '<button class="tab' + (isOn ? ' on' : '') + '" onclick="switchTab(\'' + tabList[i][0] + '\')"';
    if (isOn) h += ' style="background:' + modeColor + ';border-color:' + modeColor + '"';
    h += '>' + tabList[i][1] + '</button>';
  }
  h += '</div>';

  // Tab: Signal
  if (currentTab === "signal") {
    h += '<div class="c"><h2>지금 해야 할 일</h2>';
    h += '<div class="row"><div class="dot" style="background:' + modeColor + '"></div><div><div class="b wh" style="font-size:12px">포트폴리오 배분 확인</div><div class="d">TQQQ ' + alloc + '% / 현금 ' + (100 - alloc) + '% 비율 유지 중인지 체크</div></div></div>';
    var act2 = mode === "dip" ? "TQQQ DD -" + dd.toFixed(0) + "% > 50% → 25%에서 40%로 확대" : mode === "bear" ? "QQQ $" + Math.round(upper) + " 돌파 전까지 25% 방어" : "QQQ $" + Math.round(lower) + " 이탈시 25%로 전환";
    var act2c = mode === "dip" ? "#38bdf8" : mode === "bear" ? "#ef4444" : "#10b981";
    h += '<div class="row"><div class="dot" style="background:' + act2c + '"></div><div><div class="b wh" style="font-size:12px">' + (mode === "dip" ? "저점 매수 비중 확대" : mode === "bear" ? "현금 극대화 유지" : "공격 비중 유지") + '</div><div class="d">' + act2 + '</div></div></div>';
    h += '<div class="row"><div class="dot" style="background:#eab308"></div><div><div class="b wh" style="font-size:12px">분기 리밸런싱 D-' + daysToQ + '</div><div class="d">종가 확인 후 익일 시가 매매</div></div></div></div>';
    h += '<div class="g2">';
    h += '<div class="c" style="padding:12px"><div class="d">공격 전환 → 75/25</div><div class="gr" style="font-size:11px;margin-top:4px">QQQ &gt; $' + Math.round(upper) + '</div><div class="big">+' + ((upper / s.qqq - 1) * 100).toFixed(1) + '%</div></div>';
    h += '<div class="c" style="padding:12px"><div class="d">방어 전환 → 25/75</div><div class="rd" style="font-size:11px;margin-top:4px">QQQ &lt; $' + Math.round(lower) + '</div><div class="big">' + ((lower / s.qqq - 1) * 100).toFixed(1) + '%</div></div></div>';
    h += '<div class="c d" style="line-height:1.8;font-size:11px">';
    h += '<span class="gr">●</span> QQQ &gt; 175MA+1.5% → TQQQ <b class="wh">75%</b><br>';
    h += '<span class="rd">●</span> QQQ &lt; 175MA-1.5% → TQQQ <b class="wh">25%</b><br>';
    h += '<span class="sk">●</span> 방어 중 TQQQ DD &gt; 50% → <b class="wh">40%</b> 저점매수<br>';
    h += '<span class="yl">●</span> 버퍼 이내 → 이전 유지 · 분기말+전환시 리밸 · 쿨다운 5일</div>';

    // Recent 5 days
    h += '<div class="c" style="margin-top:10px"><h2>최근 5일</h2>';
    for (var i = 1; i <= 5 && i < rows.length; i++) {
      var d = getRow(i);
      if (!d || !d.date) break;
      var tag = i === 1 ? "📍" : "◽";
      var dv = (d.dev > 0 ? "+" : "") + d.dev.toFixed(1);
      var rc = d.regime === "BULL" ? "🐂" : "🐻";
      h += '<div style="padding:4px 0;' + (i === 1 ? 'color:#f1f5f9' : 'color:#8896ab') + '">';
      h += tag + ' ' + d.date + ' | ' + rc + ' ' + d.alloc + '%<br>';
      h += '<span class="m">TQ $' + d.tqqq + ' | QQ $' + d.qqq + ' | Dev ' + dv + '% | DD -' + d.dd.toFixed(1) + '%</span></div>';
      if (i < 5) h += '<div style="border-top:1px solid #1a2640;margin:4px 0"></div>';
    }
    h += '</div>';
  }

  // Tab: Calculator
  if (currentTab === "calc") {
    h += '<div class="c"><h2>포트폴리오 배분 계산기</h2>';
    h += '<div class="d" style="margin-bottom:4px">총 투자금</div>';
    h += '<input id="portIn" type="text" inputmode="numeric" placeholder="50000000" value="' + portVal + '" oninput="onCalc(this.value)">';
    var pv = parseFloat(portVal) || 0;
    if (pv > 0) {
      h += '<div class="g2" style="margin-top:14px">';
      h += '<div style="background:' + modeBg + ';border:1px solid ' + modeBd + ';border-radius:12px;padding:14px;text-align:center">';
      h += '<div class="m d">TQQQ (' + alloc + '%)</div>';
      h += '<div class="big" style="color:' + modeColor + '">' + Math.round(pv * alloc / 100).toLocaleString() + '</div>';
      h += '<div class="d">= ' + (pv * alloc / 100 / s.tqqq).toFixed(1) + '주 ($' + s.tqqq + ')</div></div>';
      h += '<div style="background:rgba(245,158,11,0.07);border:1px solid rgba(245,158,11,0.2);border-radius:12px;padding:14px;text-align:center">';
      h += '<div class="m d">현금 (' + (100 - alloc) + '%)</div>';
      h += '<div class="big yl">' + Math.round(pv * (100 - alloc) / 100).toLocaleString() + '</div>';
      h += '<div class="d">연 3.5% 파킹 (세후 2.96%)</div></div></div>';
    }
    h += '</div>';
  }

  // Tab: Chart
  if (currentTab === "chart") {
    h += '<div class="c"><canvas id="cv"></canvas>';
    h += '<div class="d" style="margin-top:4px">QQQ가 노란 점선 밖으로 나가면 레짐 전환</div></div>';
  }

  // Tab: History
  if (currentTab === "history") {
    h += '<div class="c"><h2>레짐 전환 히스토리</h2>';
    for (var i = 1; i < rows.length - 1; i++) {
      var cur = getRow(i);
      var prev = getRow(i + 1);
      if (!cur || !prev || !cur.date || !cur.regime || !prev.regime) continue;
      if (cur.regime !== prev.regime) {
        var b = cur.regime === "BULL";
        var bg2 = b ? "rgba(16,185,129,0.07)" : "rgba(239,68,68,0.07)";
        var bd2 = b ? "rgba(16,185,129,0.2)" : "rgba(239,68,68,0.2)";
        h += '<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;margin-bottom:5px;border-radius:8px;background:' + bg2 + ';border:1px solid ' + bd2 + '">';
        h += '<div style="width:28px;height:28px;border-radius:8px;background:' + (b ? "rgba(16,185,129,0.12)" : "rgba(239,68,68,0.12)") + ';color:' + (b ? "#10b981" : "#ef4444") + ';display:flex;align-items:center;justify-content:center;font-weight:700">' + (b ? "↑" : "↓") + '</div>';
        h += '<div style="flex:1"><div class="m b wh">' + cur.date + '</div>';
        h += '<div class="d">175MA 대비 ' + (cur.dev > 0 ? "+" : "") + cur.dev.toFixed(1) + '%</div></div>';
        h += '<div class="b" style="font-size:14px;color:' + (b ? "#10b981" : "#ef4444") + '">' + (b ? "75/25" : "25/75") + '</div></div>';
      }
    }
    h += '</div>';
  }

  // Footer
  h += '<div style="text-align:center;margin-top:14px"><button onclick="loadData()" style="background:#1a2640;color:#cbd5e1;font-size:11px;padding:6px 14px;border-radius:6px">🔄 새로고침</button></div>';
  h += '<div style="text-align:center;margin-top:8px;font-size:8px;color:#4a5f7a;font-family:monospace">QQQ 175MA ±1.5% · 75/25 전환 · DD&gt;50% 저점매수 40% · 투자 판단은 본인 책임</div>';

  document.getElementById("app").innerHTML = h;
  if (currentTab === "chart") setTimeout(drawChart, 100);
}

function switchTab(t) { currentTab = t; render(); }
function onCalc(v) { portVal = v; render(); var el = document.getElementById("portIn"); if (el) { el.focus(); el.setSelectionRange(v.length, v.length); } }

loadData();
</script>
</body>
</html>
