var INIT_ATH = 60.305;
var SK = "tqqq-v5";

// STATE

// PARAMS
var MA_P = 175;

// LOAD
var canStorage = false;
try { localStorage.setItem("_test","1"); localStorage.removeItem("_test"); canStorage = true; } catch(e) {}

function loadHist() {
  if (canStorage) {
    try {
      var raw = localStorage.getItem(SK);
      if (raw) {
        var arr = JSON.parse(raw);
        if (arr && arr.length >= MA_P) { hist = arr; return; }
      }
    } catch(e) {}
  }
  hist = SEED.slice();
  saveHist();
}

function saveHist() {
  if (canStorage) { try { localStorage.setItem(SK, JSON.stringify(hist)); } catch(e) {} }
}

// CALC
function calc() {
  if (!hist || hist.length < MA_P) return null;
  var sum = 0;
  for (var i = hist.length - MA_P; i < hist.length; i++) sum += hist[i][2];
  var ma = sum / MA_P;
  var l = hist[hist.length - 1];
  var q = l[2], t = l[1];
  var dev = ((q - ma) / ma) * 100;
  var isBull = dev > (BUF * 100);
  var isBear = dev < -(BUF * 100);
  var regime = isBull ? "bull" : isBear ? "bear" : "buffer";

  var lastBull = true;
  for (var i = 0; i < RH.length; i++) lastBull = (RH[i].to === "75/25");

  var ath = INIT_ATH;
  for (var i = 0; i < hist.length; i++) { if (hist[i][1] > ath) ath = hist[i][1]; }
  var tdd = ((ath - t) / ath) * 100;
  var dip = tdd > DIP_DD;

  var allocT, allocC, mode;
  if (regime === "bull" || (regime === "buffer" && lastBull)) {
    allocT = BULL; allocC = 100 - BULL; mode = "bull";
  } else {
    if (dip) { allocT = DIP_ALLOC; allocC = 100 - DIP_ALLOC; mode = "dip"; }
    else { allocT = BEAR; allocC = 100 - BEAR; mode = "bear"; }
  }

  var parts = l[0].split("/");
  var mo = parseInt(parts[0]), yr = parseInt(parts[2]), dy = parseInt(parts[1]);
  var qEnds = [[3,31],[6,30],[9,30],[12,31]];
  var qEnd = "", daysToQ = 0;
  var now = new Date(yr, mo - 1, dy);
  for (var i = 0; i < qEnds.length; i++) {
    var qe = new Date(yr, qEnds[i][0] - 1, qEnds[i][1]);
    if (qe >= now) {
      qEnd = String(qEnds[i][0]).padStart(2, "0") + "/" + qEnds[i][1] + "/" + yr;
      daysToQ = Math.max(0, Math.round((qe - now) / 86400000));
      break;
    }
  }
  if (!qEnd) { qEnd = "03/31/" + (yr + 1); daysToQ = Math.round((new Date(yr+1,2,31) - now) / 86400000); }

  var upper = ma * (1 + BUF), lower = ma * (1 - BUF);
  return {
    date:l[0], tqqq:t, qqq:q, ma:ma, dev:dev, regime:regime, mode:mode,
    allocT:allocT, allocC:allocC, dipActive:dip,
    tqqq_ath:ath, tqqq_dd:tdd,
    upper:upper, lower:lower,
    upperPct:((upper/q-1)*100), lowerPct:((lower/q-1)*100),
    qEnd:qEnd, daysToQ:daysToQ, total:hist.length, lastBull:lastBull
  };
}

// CHART (Canvas)
function drawChart() {
  var cv = document.getElementById("cv");
  if (!cv || !hist || hist.length < MA_P) return;
  var ctx = cv.getContext("2d");
  var dpr = window.devicePixelRatio || 1;
  var w = cv.parentElement.clientWidth - 16;
  var h = 240;
  cv.width = w * dpr; cv.height = h * dpr;
  cv.style.width = w + "px"; cv.style.height = h + "px";
  ctx.scale(dpr, dpr);

  var sl = hist.slice(-120);
  var all = [];
  for (var i = 0; i < hist.length; i++) all.push(hist[i][2]);
  var data = [];
  for (var i = 0; i < sl.length; i++) {
    var idx = hist.length - 120 + i;
    var ma = null;
    if (idx >= MA_P - 1) {
      var s2 = 0;
      for (var j = idx - MA_P + 1; j <= idx; j++) s2 += all[j];
      ma = s2 / MA_P;
    }
    data.push({ q: sl[i][2], ma: ma, u: ma ? ma * 1.015 : null, l: ma ? ma * 0.985 : null, d: sl[i][0] });
  }

  var vals = [];
  for (var i = 0; i < data.length; i++) {
    vals.push(data[i].q);
    if (data[i].ma) { vals.push(data[i].ma); vals.push(data[i].u); vals.push(data[i].l); }
  }
  var mn = Math.min.apply(null, vals) * 0.995;
  var mx = Math.max.apply(null, vals) * 1.005;
  var pad = { t: 15, r: 10, b: 28, l: 48 };
  var cw = w - pad.l - pad.r, ch = h - pad.t - pad.b;

  function xp(i) { return pad.l + (i / (data.length - 1)) * cw; }
  function yp(v) { return pad.t + (1 - (v - mn) / (mx - mn)) * ch; }

  // Grid
  ctx.strokeStyle = "rgba(42,48,68,0.4)"; ctx.lineWidth = 0.5;
  for (var i = 0; i < 5; i++) {
    var yy = pad.t + i * ch / 4;
    ctx.beginPath(); ctx.moveTo(pad.l, yy); ctx.lineTo(w - pad.r, yy); ctx.stroke();
    ctx.fillStyle = "#4a5f7a"; ctx.font = "9px monospace"; ctx.textAlign = "right";
    ctx.fillText("$" + Math.round(mn + (mx - mn) * (1 - i / 4)), pad.l - 4, yy + 3);
  }

  // X labels
  ctx.fillStyle = "#4a5f7a"; ctx.font = "8px monospace"; ctx.textAlign = "center";
  var step = Math.floor(data.length / 5);
  for (var i = 0; i < data.length; i += step) {
    if (i < data.length) ctx.fillText(data[i].d, xp(i), h - 6);
  }

  // Buffer fill
  ctx.fillStyle = "rgba(234,179,8,0.05)";
  ctx.beginPath();
  var started = false;
  for (var i = 0; i < data.length; i++) {
    if (data[i].u != null) {
      if (!started) { ctx.moveTo(xp(i), yp(data[i].u)); started = true; }
      else ctx.lineTo(xp(i), yp(data[i].u));
    }
  }
  for (var i = data.length - 1; i >= 0; i--) {
    if (data[i].l != null) ctx.lineTo(xp(i), yp(data[i].l));
  }
  ctx.fill();

  // Buffer lines (dashed)
  ctx.setLineDash([3, 3]); ctx.strokeStyle = "rgba(234,179,8,0.35)"; ctx.lineWidth = 1;
  ctx.beginPath(); started = false;
  for (var i = 0; i < data.length; i++) { if (data[i].u != null) { if (!started) { ctx.moveTo(xp(i), yp(data[i].u)); started = true; } else ctx.lineTo(xp(i), yp(data[i].u)); } } ctx.stroke();
  ctx.beginPath(); started = false;
  for (var i = 0; i < data.length; i++) { if (data[i].l != null) { if (!started) { ctx.moveTo(xp(i), yp(data[i].l)); started = true; } else ctx.lineTo(xp(i), yp(data[i].l)); } } ctx.stroke();
  ctx.setLineDash([]);

  // MA line (orange)
  ctx.strokeStyle = "#f97316"; ctx.lineWidth = 2; ctx.beginPath(); started = false;
  for (var i = 0; i < data.length; i++) { if (data[i].ma != null) { if (!started) { ctx.moveTo(xp(i), yp(data[i].ma)); started = true; } else ctx.lineTo(xp(i), yp(data[i].ma)); } } ctx.stroke();

  // QQQ line (cyan)
  ctx.strokeStyle = "#22d3ee"; ctx.lineWidth = 2.5; ctx.beginPath();
  ctx.moveTo(xp(0), yp(data[0].q));
  for (var i = 1; i < data.length; i++) ctx.lineTo(xp(i), yp(data[i].q));
  ctx.stroke();

  // Legend
  ctx.font = "10px monospace";
  ctx.fillStyle = "#22d3ee"; ctx.fillText("━ QQQ", pad.l + 10, pad.t + 4);
  ctx.fillStyle = "#f97316"; ctx.fillText("━ 175MA", pad.l + 75, pad.t + 4);
  ctx.fillStyle = "#4a5f7a"; ctx.fillText("┈ ±1.5%", pad.l + 148, pad.t + 4);
}

  var s = calc();
  if (!s) { document.getElementById("app").innerHTML = '<div style="padding:40px;text-align:center;color:#ef4444">데이터 부족</div>'; return; }

  var h = "";

  h += '<div style="display:flex;justify-content:space-between;margin-bottom:14px">';
  h += '<div><div class="m d" style="letter-spacing:1px;color:#10b981">TQQQ DEFENSE+ · 175MA ±1.5%</div>';
  h += '<h1>매매 시그널</h1>';
  h += '<div class="m d">CAGR 33.2% · MDD -44.7% · Calmar 0.74</div></div>';
  h += '<div style="text-align:right"><div class="m d">기준일</div>';
  h += '<div class="m b wh">' + s.date + '</div>';
  h += '<div class="m d">' + s.total + '일</div></div></div>';

  // Msg
  if (msgText) {
    h += '<div class="msg" style="background:' + (msgOk ? "rgba(16,185,129,0.07);border:1px solid rgba(16,185,129,0.2);color:#10b981" : "rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.2);color:#ef4444") + '">' + (msgOk ? "✓ " : "✗ ") + msgText + '</div>';
  }

  // Signal card
  h += '<div class="sig" style="background:' + modeBg + ';border:2px solid ' + modeBd + '">';
  h += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">';
  h += '<div style="width:48px;height:48px;border-radius:14px;background:' + modeColor + '15;border:2px solid ' + modeColor + '40;display:flex;align-items:center;justify-content:center;font-size:24px">' + modeIcon + '</div>';
  h += '<div><div class="b" style="color:' + modeColor + ';font-size:13px">' + modeLbl;
  if (s.regime === "buffer") h += ' <span class="d">(' + (s.lastBull ? "공격" : "방어") + ' 유지)</span>';
  h += '</div><div class="b wh" style="font-size:26px;line-height:1.1">TQQQ ' + s.allocT + '% · 현금 ' + s.allocC + '%</div></div></div>';
  h += '<div class="g3" style="padding-top:12px;border-top:1px solid ' + modeColor + '22">';
  h += '<div><div class="d">TQQQ</div><div class="m b wh">$' + s.tqqq + '</div></div>';
  h += '<div><div class="d">QQQ vs MA</div><div class="m b" style="color:' + devColor + '">' + (s.dev > 0 ? "+" : "") + s.dev.toFixed(1) + '%</div></div>';
  h += '<div><div class="d">TQQQ DD</div><div class="m b" style="color:' + ddColor + '">-' + s.tqqq_dd.toFixed(0) + '%</div></div></div>';
  h += '<div class="g3" style="margin-top:6px">';
  h += '<div><div class="d">175MA</div><div class="m b or">$' + s.ma.toFixed(0) + '</div></div>';
  h += '<div><div class="d">ATH</div><div class="m" style="color:#4a5f7a">$' + s.tqqq_ath.toFixed(2) + '</div></div>';
  h += '<div><div class="d">리밸런싱</div><div class="m b yl">D-' + s.daysToQ + '</div></div></div></div>';

  // Tabs
  h += '<div class="tabs">';
  var tabList = [["signal","시그널"],["calc","배분계산"],["chart","차트"],["history","히스토리"],["update","업데이트"]];
  for (var i = 0; i < tabList.length; i++) {
    var isOn = currentTab === tabList[i][0];
    h += '<button class="tab' + (isOn ? ' on' : '') + '" onclick="switchTab(\'' + tabList[i][0] + '\')"';
    if (isOn) h += ' style="background:' + modeColor + ';border-color:' + modeColor + '"';
    h += '>' + tabList[i][1] + '</button>';
  }
  h += '</div>';

  // TAB: Signal
  if (currentTab === "signal") {
    h += '<div class="c"><h2>지금 해야 할 일</h2>';
    h += '<div class="row"><div class="dot" style="background:' + modeColor + '"></div><div><div class="b wh" style="font-size:12px">포트폴리오 배분 확인</div><div class="d">TQQQ ' + s.allocT + '% / 현금 ' + s.allocC + '% 비율 유지 중인지 체크</div></div></div>';
    var act2 = s.mode === "dip" ? "TQQQ DD -" + s.tqqq_dd.toFixed(0) + "% > 50% → 25%에서 40%로 확대" : s.mode === "bear" ? "QQQ $" + s.upper.toFixed(0) + " 돌파 전까지 25% 방어" : "QQQ $" + s.lower.toFixed(0) + " 이탈시 25%로 전환";
    var act2c = s.mode === "dip" ? "#38bdf8" : s.mode === "bear" ? "#ef4444" : "#10b981";
    h += '<div class="row"><div class="dot" style="background:' + act2c + '"></div><div><div class="b wh" style="font-size:12px">' + (s.mode === "dip" ? "저점 매수 비중 확대" : s.mode === "bear" ? "현금 극대화 유지" : "공격 비중 유지") + '</div><div class="d">' + act2 + '</div></div></div>';
    h += '<div class="row"><div class="dot" style="background:#eab308"></div><div><div class="b wh" style="font-size:12px">분기 리밸런싱 D-' + s.daysToQ + '</div><div class="d">' + s.qEnd + ' 예정 · 종가 확인 후 익일 시가 매매</div></div></div></div>';
    h += '<div class="g2">';
    h += '<div class="c" style="padding:12px"><div class="d">공격 전환 → 75/25</div><div class="gr" style="font-size:11px;margin-top:4px">QQQ &gt; $' + s.upper.toFixed(0) + '</div><div class="big wh">+' + s.upperPct.toFixed(1) + '%</div></div>';
    h += '<div class="c" style="padding:12px"><div class="d">방어 전환 → 25/75</div><div class="rd" style="font-size:11px;margin-top:4px">QQQ &lt; $' + s.lower.toFixed(0) + '</div><div class="big wh">' + s.lowerPct.toFixed(1) + '%</div></div></div>';
    h += '<div class="c d" style="line-height:1.8;font-size:11px">';
    h += '<span class="gr">●</span> QQQ &gt; 175MA+1.5% → TQQQ <b class="wh">75%</b><br>';
    h += '<span class="rd">●</span> QQQ &lt; 175MA-1.5% → TQQQ <b class="wh">25%</b><br>';
    h += '<span class="sk">●</span> 방어 중 TQQQ DD &gt; 50% → <b class="wh">40%</b> 저점매수<br>';
    h += '<span class="yl">●</span> 버퍼 이내 → 이전 유지 · 분기말+전환시 리밸 · 쿨다운 5일</div>';
  }

  // TAB: Calc
  if (currentTab === "calc") {
    h += '<div class="c"><h2>포트폴리오 배분 계산기</h2>';
    h += '<div class="d" style="margin-bottom:4px">총 투자금</div>';
    h += '<input id="portIn" type="text" inputmode="numeric" placeholder="50000000" value="' + portVal + '" oninput="onCalc(this.value)">';
    var pv = parseFloat(portVal) || 0;
    if (pv > 0) {
      h += '<div class="g2" style="margin-top:14px">';
      h += '<div style="background:' + modeBg + ';border:1px solid ' + modeBd + ';border-radius:12px;padding:14px;text-align:center">';
      h += '<div class="m d">TQQQ (' + s.allocT + '%)' + (s.mode === "dip" ? " 💎" : "") + '</div>';
      h += '<div class="big" style="color:' + modeColor + '">' + Math.round(pv * s.allocT / 100).toLocaleString() + '</div>';
      h += '<div class="d">= ' + (pv * s.allocT / 100 / s.tqqq).toFixed(1) + '주 ($' + s.tqqq + ')</div></div>';
      h += '<div style="background:rgba(245,158,11,0.07);border:1px solid rgba(245,158,11,0.2);border-radius:12px;padding:14px;text-align:center">';
      h += '<div class="m d">현금 (' + s.allocC + '%)</div>';
      h += '<div class="big yl">' + Math.round(pv * s.allocC / 100).toLocaleString() + '</div>';
      h += '<div class="d">연 3.5% 파킹 (세후 2.96%)</div></div></div>';
    }
    h += '</div>';
  }

  // TAB: Chart
  if (currentTab === "chart") {
    h += '<div class="c"><canvas id="cv"></canvas>';
    h += '<div class="d" style="margin-top:4px">QQQ가 노란 점선 밖으로 나가면 레짐 전환</div></div>';
  }

  // TAB: History
  if (currentTab === "history") {
    h += '<div class="c"><h2>레짐 전환 히스토리</h2>';
    var rev = RH.slice().reverse();
    for (var i = 0; i < rev.length; i++) {
      var r = rev[i], b = r.to === "75/25", lt = (i === 0);
      var bg2 = lt ? (b ? "rgba(16,185,129,0.07)" : "rgba(239,68,68,0.07)") : "transparent";
      var bd2 = lt ? (b ? "rgba(16,185,129,0.2)" : "rgba(239,68,68,0.2)") : "transparent";
      h += '<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;margin-bottom:5px;border-radius:8px;background:' + bg2 + ';border:1px solid ' + bd2 + '">';
      h += '<div style="width:28px;height:28px;border-radius:8px;background:' + (b ? "rgba(16,185,129,0.12)" : "rgba(239,68,68,0.12)") + ';color:' + (b ? "#10b981" : "#ef4444") + ';display:flex;align-items:center;justify-content:center;font-weight:700">' + (b ? "↑" : "↓") + '</div>';
      h += '<div style="flex:1"><div class="m b wh">' + r.d;
      if (lt) h += ' <span class="pill" style="background:' + modeColor + '22;color:' + modeColor + '">현재</span>';
      h += '</div><div class="d">175MA 대비 ' + (r.dev > 0 ? "+" : "") + r.dev + '%</div></div>';
      h += '<div class="b" style="font-size:14px;color:' + (b ? "#10b981" : "#ef4444") + '">' + r.to + '</div></div>';
    }
    h += '</div>';
  }

  // TAB: Update
  if (currentTab === "update") {
    h += '<div class="c"><h2>가격 가져오기</h2>';
    h += '<button id="fetchBtn" onclick="doFetch()" style="width:100%;background:linear-gradient(135deg,#22d3ee,#10b981);color:#060a12;padding:14px;font-size:14px">🔍 Yahoo Finance에서 가격 가져오기</button>';
    h += '<div class="d" style="margin-top:6px">페이지 열면 자동 업데이트 · 버튼으로 수동 새로고침</div></div>';
    h += '<div class="c"><h2>수동 입력</h2>';
    h += '<div class="g2"><div><div class="d">TQQQ 종가</div><input id="inT" type="number" step="0.01" placeholder="43.08" style="margin-top:4px"></div>';
    h += '<div><div class="d">QQQ 종가</div><input id="inQ" type="number" step="0.01" placeholder="582.06" style="margin-top:4px"></div></div>';
    h += '<button onclick="addManual()" style="width:100%;margin-top:10px;background:transparent;border:1px solid #f97316;color:#f97316;padding:10px">저장</button></div>';
    h += '<div class="c d">저장: ' + (hist ? hist.length : 0) + '일 · <b class="gr">실제 QQQ 종가</b> · localStorage';
    h += '<br><button onclick="resetAll()" style="margin-top:6px;background:transparent;border:1px solid #1a2640;color:#4a5f7a;font-size:10px;padding:4px 8px">초기화</button></div>';
  }

  h += '<div style="text-align:center;margin-top:14px;font-size:8px;color:#4a5f7a;font-family:monospace">QQQ 175MA ±1.5% · 75/25 전환 · DD&gt;50% 저점매수 40% · 투자 판단은 본인 책임</div>';

  document.getElementById("app").innerHTML = h;
  if (currentTab === "chart") setTimeout(drawChart, 100);
}

// ACTIONS
function switchTab(t) { currentTab = t; render(); }
function onCalc(v) { portVal = v; render(); var el = document.getElementById("portIn"); if (el) { el.focus(); el.setSelectionRange(v.length, v.length); } }

function showMsg(ok, text, duration) {
  msgOk = ok; msgText = text; render();
  if (duration) setTimeout(function() { msgText = null; render(); }, duration);
}

function addEntry(date, tqqq, qqq) {
  var entry = [date, tqqq, qqq];
  var lastD = hist[hist.length - 1][0];
  if (date === lastD) { hist = hist.slice(0, -1).concat([entry]); }
  else { hist = hist.concat([entry]); }
  if (hist.length > 250) hist = hist.slice(-250);
  saveHist();
}

function doFetch() {
  showMsg(true, "검색중...", 0);
  var proxies = [
    "https://api.allorigins.win/raw?url=",
    "https://api.codetabs.com/v1/proxy?quest=",
    "https://corsproxy.io/?"
  ];
  var yahooBase = "https://query2.finance.yahoo.com/v8/finance/chart/";

  function tryFetchBoth(proxyIdx) {
    if (proxyIdx >= proxies.length) {
      showMsg(false, "자동 업데이트 실패 — 아래 수동 입력 사용", 0);
      return;
    }
    var p = proxies[proxyIdx];
    var qqqUrl = p + encodeURIComponent(yahooBase + "QQQ?interval=1d&range=2d");
    var tqqqUrl = p + encodeURIComponent(yahooBase + "TQQQ?interval=1d&range=2d");
    var qqqData = null;

    var xhr1 = new XMLHttpRequest();
    xhr1.timeout = 8000;
    xhr1.onload = function() {
      try {
        var d = JSON.parse(xhr1.responseText);
        qqqData = d;
        var xhr2 = new XMLHttpRequest();
        xhr2.timeout = 8000;
        xhr2.onload = function() {
          try {
            var d2 = JSON.parse(xhr2.responseText);
            var qp = qqqData.chart.result[0].meta.regularMarketPrice;
            var tp = d2.chart.result[0].meta.regularMarketPrice;
            var ts = qqqData.chart.result[0].meta.regularMarketTime;
            var dt = new Date(ts * 1000);
            var ds = String(dt.getMonth()+1).padStart(2,"0") + "/" + String(dt.getDate()).padStart(2,"0") + "/" + dt.getFullYear();
            qp = Math.round(qp * 100) / 100;
            tp = Math.round(tp * 100) / 100;
            if (qp > 0 && tp > 0) {
              addEntry(ds, tp, qp);
              showMsg(true, "QQQ $" + qp + " / TQQQ $" + tp + " (" + ds + ")", 10000);
            } else { tryFetchBoth(proxyIdx + 1); }
          } catch(e) { tryFetchBoth(proxyIdx + 1); }
        };
        xhr2.onerror = function() { tryFetchBoth(proxyIdx + 1); };
        xhr2.ontimeout = function() { tryFetchBoth(proxyIdx + 1); };
        xhr2.open("GET", tqqqUrl);
        xhr2.send();
      } catch(e) { tryFetchBoth(proxyIdx + 1); }
    };
    xhr1.onerror = function() { tryFetchBoth(proxyIdx + 1); };
    xhr1.ontimeout = function() { tryFetchBoth(proxyIdx + 1); };
    xhr1.open("GET", qqqUrl);
    xhr1.send();
  }
  tryFetchBoth(0);
}

function addManual() {
  var elT = document.getElementById("inT");
  var elQ = document.getElementById("inQ");
  if (!elT || !elQ) return;
  var t = parseFloat(elT.value), q = parseFloat(elQ.value);
  if (isNaN(t) || isNaN(q) || t <= 0 || q <= 0) { showMsg(false, "가격을 입력하세요", 3000); return; }
  var now = new Date();
  var ds = String(now.getMonth()+1).padStart(2,"0") + "/" + String(now.getDate()).padStart(2,"0") + "/" + now.getFullYear();
  addEntry(ds, t, q);
  showMsg(true, "QQQ $" + q + " / TQQQ $" + t + " 저장", 5000);
}

function resetAll() {
  hist = SEED.slice();
  saveHist();
  showMsg(true, "초기화 완료", 3000);
}

// INIT
try {
  loadHist();
  render();
} catch(e) {
  document.getElementById("app").innerHTML = '<div style="padding:20px;color:#ef4444"><b>Init Error:</b> ' + e.message + '</div>';
}

// Auto-fetch (safe, delayed)
setTimeout(function() {
  try { doFetch(); } catch(e) {}
}, 2000);
</script>
</body>
